{% load static %}

<!DOCTYPE html>
<html>

<head>

    <title>OTP Verification</title>

    <link rel="stylesheet"
          href="{% static 'css/styles.css' %}">

</head>

<body>

<div class="login-card">

    <h2>Verify OTP</h2>

    <p>Enter the OTP sent to your email.</p>

    <input
        id="otp"
        type="text"
        maxlength="6"
        placeholder="Enter OTP">

    <button onclick="verifyOtp()">

        Verify OTP

    </button>

</div>

<script src="{% static 'js/app.js' %}"></script>

</body>

</html>
