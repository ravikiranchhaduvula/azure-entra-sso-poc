{% load static %}
<!DOCTYPE html>
<html>

<head>

    <meta charset="UTF-8">

    <title>CapeArk</title>

    <link rel="stylesheet" href="{% static 'css/styles.css' %}">

</head>

<body>

<div class="login-card">

    <h1>CapeArk</h1>

    <p>Internal User Login</p>

    <input
        id="email"
        type="email"
        placeholder="Email">

    <input
        id="password"
        type="password"
        placeholder="Password">

    <button onclick="login()">

        Login

    </button>

    <hr>

    <p>

        Customer users authenticate from their own portal.

    </p>

</div>

<script src="{% static 'js/app.js' %}"></script>

</body>

</html>
